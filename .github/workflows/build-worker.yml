name: Build & Push Worker

on:
  push:
    branches: [main]
    paths:
      - "worker/**"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Free disk space
        run: |
          df -h
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo apt-get clean
          docker system prune -af || true
          df -h

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push
        uses: docker/build-push-action@v5
        with:
          context: ./worker
          push: true
          tags: ghcr.io/jorgevarelarz/avatarlab-worker:latest
          cache-from: type=registry,ref=ghcr.io/jorgevarelarz/avatarlab-worker:cache
          cache-to: type=registry,ref=ghcr.io/jorgevarelarz/avatarlab-worker:cache,mode=max
